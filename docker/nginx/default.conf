server {
    listen 80;
    server_name _;

    charset utf-8;

    # Media uploads are validated at 10MB in the app; allow headroom here.
    client_max_body_size 12m;

    # Vue production build (mounted read-only at /var/www/spa)
    root /var/www/spa;
    index index.html;

    # Laravel storage files (public disk — uploaded media)
    location /storage/ {
        alias /var/www/html/public/storage/;
        try_files $uri =404;
    }

    # Real files from the SPA build (JS/CSS/images) are served directly;
    # everything else — API, sitemap, robots, and page HTML with
    # server-injected meta tags — goes to Laravel.
    location / {
        try_files $uri @laravel;
    }

    location @laravel {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
    }

    location ~ /\.ht {
        deny all;
    }
}
